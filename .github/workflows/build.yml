name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os-name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-name: Windows
            artifact-name: PS5-Vault-Windows
            artifact-path: dist/*.exe
            build-cmd: npx electron-builder --win portable --publish never

          - runner: macos-latest
            os-name: macOS
            artifact-name: PS5-Vault-macOS
            artifact-path: dist/*.dmg
            build-cmd: npx electron-builder --mac --publish never

          - runner: ubuntu-latest
            os-name: Linux
            artifact-name: PS5-Vault-Linux
            artifact-path: dist/*.AppImage
            build-cmd: npx electron-builder --linux AppImage --publish never

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux build dependencies
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libxss1 \
            libasound2-dev \
            libgbm-dev \
            libxtst6 \
            libnss3-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libpango-1.0-0 \
            libcairo2 \
            fuse

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build-cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PS5 Vault ${{ github.ref_name }}
          body: Automated release for ${{ github.ref_name }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
